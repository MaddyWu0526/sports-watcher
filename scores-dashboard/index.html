<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Maddy's Sports Hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --border: #30363d;
      --text: #e6edf3;
      --muted: #8b949e;
      --live: #3fb950;
      --accent: #a78bfa;
      --error: #f85149;
      --on-accent: #1e0a3c;
    }

    [data-theme="light"] {
      --bg: #f0f2f7;
      --surface: #ffffff;
      --border: #e5e7eb;
      --text: #111827;
      --muted: #6b7280;
      --live: #059669;
      --accent: #7c3aed;
      --error: #dc2626;
      --on-accent: #ffffff;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      min-height: 100vh;
      transition: background 0.2s, color 0.2s;
    }

    header {
      padding: 18px 36px;
      border-bottom: none;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: relative;
      background: linear-gradient(135deg, #5b21b6 0%, #9333ea 100%);
      box-shadow: none;
    }

    h1 {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.3px;
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      white-space: nowrap;
      color: #ffffff;
    }

    .header-right { display: flex; align-items: center; gap: 16px; }

    #last-updated {
      font-size: 11px;
      color: rgba(255,255,255,0.9);
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 20px;
      padding: 5px 11px;
      backdrop-filter: blur(4px);
      letter-spacing: 0.2px;
      white-space: nowrap;
    }

    .btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 20px;
      color: var(--muted);
      font-size: 13px;
      padding: 6px 16px;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }
    .btn:hover { color: var(--text); border-color: var(--muted); }
    .btn:disabled { opacity: 0.5; cursor: default; }
    #refresh-btn {
      background: rgba(255,255,255,0.15);
      border-color: rgba(255,255,255,0.35);
      color: #ffffff;
      font-weight: 600;
      border-radius: 20px;
      backdrop-filter: blur(4px);
    }
    #refresh-btn:hover { background: rgba(255,255,255,0.25); color: #ffffff; border-color: rgba(255,255,255,0.5); }
    #refresh-btn:disabled { opacity: 0.5; }

    /* ── Filter bar ── */

    /* ── Add-sport tab button ── */
    .tab-add {
      background: none;
      border: 1px dashed var(--border);
      border-radius: 6px;
      color: var(--muted);
      font-size: 18px;
      line-height: 1;
      padding: 6px 12px;
      cursor: pointer;
      margin-left: 4px;
      transition: color 0.15s, border-color 0.15s;
      align-self: center;
    }
    .tab-add:hover { color: var(--accent); border-color: var(--accent); }

    /* ── Sports modal ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.55);
      z-index: 200;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      width: 400px;
      max-width: 92vw;
      max-height: 80vh;
      display: flex;
      flex-direction: column;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }
    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 22px 14px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .modal-header h2 { font-size: 15px; font-weight: 700; }
    .modal-close {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 22px;
      cursor: pointer;
      padding: 0;
      line-height: 1;
    }
    .modal-close:hover { color: var(--text); }
    .modal-body { overflow-y: auto; padding: 16px 22px 20px; flex: 1; }
    .sport-category { margin-bottom: 18px; }
    .sport-category:last-child { margin-bottom: 0; }
    .sport-category-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.6px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 4px;
    }
    .sport-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 9px 0;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
    }
    .sport-row:last-child { border-bottom: none; }
    .sport-row-name { font-size: 13px; color: var(--muted); transition: color 0.15s; }
    .sport-row-name.on { color: var(--text); font-weight: 600; }
    .sport-row:hover .sport-row-name { color: var(--text); }
    .sport-mini-track {
      width: 30px;
      height: 17px;
      border-radius: 9px;
      background: var(--border);
      position: relative;
      transition: background 0.2s;
      flex-shrink: 0;
    }
    .sport-mini-track.on { background: var(--live); }
    .sport-mini-thumb {
      width: 11px;
      height: 11px;
      border-radius: 50%;
      background: #fff;
      position: absolute;
      top: 3px;
      left: 3px;
      transition: transform 0.2s;
    }
    .sport-mini-track.on .sport-mini-thumb { transform: translateX(13px); }

    /* ── Theme toggle ── */
    .theme-toggle {
      display: flex;
      align-items: center;
      gap: 7px;
      cursor: pointer;
      user-select: none;
    }
    .theme-toggle-icon { font-size: 14px; line-height: 1; color: rgba(255,255,255,0.85); }
    .theme-track {
      width: 36px;
      height: 20px;
      border-radius: 10px;
      background: rgba(255,255,255,0.25);
      position: relative;
      transition: background 0.2s;
      flex-shrink: 0;
    }
    [data-theme="light"] .theme-track { background: rgba(255,255,255,0.5); }
    .theme-thumb {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #ffffff;
      position: absolute;
      top: 3px;
      left: 3px;
      transition: transform 0.2s;
    }
    [data-theme="light"] .theme-thumb { transform: translateX(16px); }

    /* ── Tabs ── */
    nav {
      padding: 10px 28px;
      border-bottom: 1px solid var(--border);
      display: flex;
      gap: 4px;
      align-items: center;
      justify-content: center;
      overflow-x: auto;
      scrollbar-width: none;
      background: var(--surface);
    }
    nav::-webkit-scrollbar { display: none; }

    .tab {
      background: none;
      border: none;
      border-radius: 20px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 500;
      padding: 7px 14px 7px 10px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: color 0.15s, background 0.15s;
      user-select: none;
      white-space: nowrap;
    }
    .tab:hover { color: var(--text); background: var(--border); }
    .tab.active {
      color: #ffffff;
      background: linear-gradient(135deg, #6d28d9, #9333ea);
      padding: 7px 20px 7px 14px;
    }
    .tab.dragging { opacity: 0.3; }
    .tab.drag-over { background: var(--border); color: var(--text); }

    .drag-handle {
      font-size: 15px;
      color: var(--border);
      cursor: grab;
      line-height: 1;
      transition: color 0.15s;
    }
    .tab:hover .drag-handle { color: var(--muted); }
    .tab.active .drag-handle { color: #ffffff; opacity: 0.5; }

    .live-count {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: var(--live);
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      width: 16px;
      height: 16px;
      border-radius: 50%;
    }
    .tab.active .live-count {
      background: #ffffff;
      color: #6d28d9;
    }

    /* ── Main ── */
    main { padding: 28px 28px; max-width: 1600px; }

    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 18px;
      align-items: start;
    }

    /* ── Cards ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      transition: border-color 0.15s, transform 0.15s, box-shadow 0.15s;
      box-shadow: none;
    }
    .card.clickable { cursor: pointer; }
    .card.clickable:hover { transform: translateY(-2px); }
    [data-theme="light"] .card { border-color: transparent; }
    .card.is-live {
      border-color: transparent;
      background:
        linear-gradient(var(--surface), var(--surface)) padding-box,
        linear-gradient(135deg, #6d28d9, #9333ea) border-box;
    }

    .card-top {
      padding: 10px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
      position: relative;
      background: var(--bg);
    }
    [data-theme="light"] .card-top { background: #e2e5ea; }

    .live-badge {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      font-weight: 700;
      color: var(--live);
      letter-spacing: 0.5px;
    }
    .live-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--live);
      animation: blink 1.4s ease-in-out infinite;
    }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }

    .game-status {
      font-size: 12px;
      color: var(--muted);
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      white-space: nowrap;
    }

    .card-body {
      padding: 16px 16px 28px;
      display: flex;
      align-items: center;
      gap: 0;
    }

    /* Outer team side: logo + name stacked, pushed to the edges */
    .team-side {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }
    .team-side.home { flex-direction: row-reverse; }

    .team-logo-wrap { flex-shrink: 0; position: relative; }
    .team-logo { width: 42px; height: 42px; object-fit: contain; }
    .team-logo-ph {
      width: 42px; height: 42px;
      border-radius: 50%;
      background: var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700; color: var(--muted);
    }

    .team-name-wrap { min-width: 0; }
    .team-side.away .team-name-wrap { text-align: left; }
    .team-side.home .team-name-wrap { text-align: right; }

    .team-abbr { font-size: 12px; font-weight: 600; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .team-ha {
      position: absolute;
      top: calc(100% + 5px);
      left: 50%;
      transform: translateX(-50%);
      font-size: 10px; color: var(--muted); opacity: 0.7;
      letter-spacing: 0.3px; white-space: nowrap;
    }

    /* Center score block */
    .score-center {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
      padding: 0 12px;
    }
    .team-score {
      font-size: 28px; font-weight: 800;
      font-variant-numeric: tabular-nums;
      line-height: 1.1;
    }
    .team-score.dim { color: var(--muted); }
    .score-sep { font-size: 20px; font-weight: 300; color: var(--border); }
    .pen-bracket { font-size: 15px; font-weight: 300; color: var(--muted); letter-spacing: 0.5px; margin: 0 6px; }
    .divider { display: none; }

    /* ── Stats toggle hint ── */
    .stats-hint {
      padding: 8px 16px;
      font-size: 11px;
      color: var(--muted);
      border-top: 1px solid var(--border);
      text-align: center;
      letter-spacing: 0.2px;
      transition: color 0.15s;
    }
    .card.clickable:hover .stats-hint { color: var(--accent); }
    .card.expanded .stats-hint { color: var(--accent); }

    /* ── Stats panel ── */
    .stats-panel {
      max-height: 0;
      overflow: hidden;
      opacity: 0;
      transition: max-height 0.3s ease, opacity 0.2s ease;
      border-top: 1px solid transparent;
    }
    .stats-panel.open {
      max-height: 2000px;
      opacity: 1;
      border-top-color: var(--border);
    }

    .stats-inner { padding: 16px; background: #1a2332; }
    [data-theme="light"] .stats-inner { background: #eef1f6; }

    .stats-loading {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 20px 0;
      color: var(--muted);
      font-size: 13px;
    }

    .stats-empty {
      padding: 16px 0;
      color: var(--muted);
      font-size: 13px;
      text-align: center;
    }

    /* Basketball */
    .bball-stats { display: flex; flex-direction: column; gap: 18px; }

    .team-stats-label {
      font-size: 11px;
      font-weight: 700;
      color: var(--muted);
      letter-spacing: 0.8px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .stats-table { width: 100%; border-collapse: collapse; font-size: 12px; }
    .stats-table th {
      text-align: right;
      color: var(--muted);
      font-weight: 600;
      font-size: 11px;
      padding: 0 6px 6px;
      letter-spacing: 0.3px;
    }
    .stats-table th.col-name { text-align: left; padding-left: 0; }
    .stats-table td {
      text-align: right;
      padding: 5px 6px;
      color: var(--text);
      border-top: 1px solid var(--border);
    }
    .stats-table td.col-name {
      text-align: left;
      padding-left: 0;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 120px;
    }
    .stats-table td.pts { font-weight: 700; color: var(--accent); }
    .extra-player { display: none; }
    .team-stats-block.expanded .extra-player { display: table-row; }
    .show-more-btn {
      background: none;
      border: none;
      color: var(--accent);
      font-size: 12px;
      cursor: pointer;
      padding: 8px 0 2px;
      display: block;
      text-align: left;
    }
    .show-more-btn:hover { text-decoration: underline; }

    /* Soccer */
    .goals-title {
      font-size: 11px;
      font-weight: 700;
      color: var(--muted);
      letter-spacing: 0.8px;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .goal-event {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 0;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
    }
    .goal-event:last-child { border-bottom: none; }

    .goal-clock {
      font-size: 12px;
      color: var(--muted);
      font-variant-numeric: tabular-nums;
      min-width: 32px;
    }
    .goal-detail { flex: 1; display: flex; flex-direction: column; gap: 1px; }
    .goal-name { font-size: 13px; }
    .goal-assist { font-size: 11px; color: var(--muted); }
    .goal-team {
      font-size: 10px;
      font-weight: 700;
      color: var(--muted);
      background: var(--border);
      padding: 2px 5px;
      border-radius: 3px;
    }
    .goal-badge {
      font-size: 10px;
      font-weight: 700;
      color: var(--muted);
      background: var(--border);
      padding: 2px 5px;
      border-radius: 3px;
    }

    /* ── Tennis cards ── */
    /* ── Tennis card ── */
    .tennis-meta-inline {
      font-size: 12px; color: var(--muted);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .tennis-row {
      display: flex; align-items: center;
      padding: 8px 14px; gap: 6px;
    }
    .tennis-row + .tennis-row { border-top: 1px solid var(--border); }
    .ts-flag {
      width: 22px; height: 15px; object-fit: cover;
      border-radius: 2px; flex-shrink: 0;
    }
    .ts-flag-ph {
      width: 22px; height: 15px;
      background: var(--border); border-radius: 2px; flex-shrink: 0;
    }
    .ts-seed {
      font-size: 10px; font-weight: 600; color: var(--muted);
      width: 18px; text-align: right; flex-shrink: 0;
    }
    .ts-name {
      flex: 1; font-size: 13px; color: var(--muted);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      min-width: 0;
    }
    .ts-name.winner { color: var(--text); font-weight: 600; }
    .ts-scores { display: flex; gap: 3px; align-items: center; flex-shrink: 0; }
    .ts-set {
      font-size: 13px; font-weight: 600; color: var(--muted);
      width: 16px; text-align: center; font-variant-numeric: tabular-nums;
    }
    .ts-set.won { color: var(--text); }
    .ts-set sup { font-size: 8px; font-weight: 400; }
    .ts-pts {
      font-size: 11px; font-weight: 700; color: var(--accent);
      width: 24px; text-align: right; font-variant-numeric: tabular-nums;
      margin-left: 6px; flex-shrink: 0; line-height: 1;
    }
    .ts-ball {
      width: 14px; flex-shrink: 0;
      font-size: 11px; line-height: 1;
    }

    /* ── Date strip ── */
    .date-strip {
      padding: 10px 28px;
      border-bottom: 1px solid var(--border);
      display: flex;
      gap: 4px;
      justify-content: center;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .date-strip::-webkit-scrollbar { display: none; }

    .date-pill {
      background: none;
      border: 1px solid transparent;
      border-radius: 8px;
      color: var(--muted);
      cursor: pointer;
      padding: 7px 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1px;
      min-width: 52px;
      flex-shrink: 0;
      transition: color 0.15s, border-color 0.15s, background 0.15s;
    }
    .date-pill:hover { color: var(--text); border-color: var(--border); }
    .date-pill.active { color: var(--text); background: var(--surface); border-color: var(--accent); }
    .date-pill.today { border-color: #9333ea; color: #9333ea; font-weight: 600; }
    .date-pill.today.active { background: linear-gradient(135deg, #6d28d9, #9333ea); color: #ffffff; border-color: transparent; }
    .date-pill.today.active .pill-today { color: #ffffff; opacity: 0.85; }

    .pill-dow { font-size: 10px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; }
    .pill-num { font-size: 18px; font-weight: 700; line-height: 1.15; font-variant-numeric: tabular-nums; }
    .pill-today { font-size: 9px; font-weight: 700; color: var(--accent); text-transform: uppercase; letter-spacing: 0.5px; }

    /* States */
    .empty-state {
      text-align: center;
      padding: 64px 24px;
      color: var(--muted);
    }
    .empty-state h2 { font-size: 18px; font-weight: 600; color: var(--text); margin-bottom: 8px; }

    .loading-state {
      display: flex; align-items: center; justify-content: center;
      padding: 64px 24px; gap: 12px;
      color: var(--muted); font-size: 14px;
    }

    .error-state {
      background: rgba(248,81,73,.1);
      border: 1px solid rgba(248,81,73,.3);
      border-radius: 10px;
      padding: 20px;
      color: var(--error);
      font-size: 14px; line-height: 1.5;
    }

    .spinner {
      width: 18px; height: 18px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Countdown */
    .countdown {
      display: flex; align-items: center; gap: 8px;
      margin-top: 20px; font-size: 12px; color: var(--muted);
    }
    .countdown-ring svg { transform: rotate(-90deg); display: block; }
    .countdown-ring circle { fill: none; stroke-width: 2; }
    .ring-bg { stroke: var(--border); }
    .ring-fill { stroke: var(--accent); stroke-linecap: round; transition: stroke-dashoffset 0.9s linear; }

    /* ── Responsive ── */
    main { width: 100%; margin: 0 auto; }

    @media (max-width: 1200px) {
      .grid { grid-template-columns: repeat(3, 1fr); }
    }

    @media (max-width: 900px) {
      header { padding: 14px 20px; }
      nav { padding: 0 20px; }
      .date-strip { padding: 8px 20px; }
      main { padding: 18px 20px; }
      .grid { grid-template-columns: repeat(2, 1fr); }
    }

    @media (max-width: 600px) {
      header { padding: 22px 16px; flex-wrap: wrap; gap: 8px; justify-content: space-between; }
      h1 { font-size: 18px; position: static; transform: none; color: #ffffff; }
      #last-updated { display: none; }
      .header-right { gap: 10px; }
      .nav-wrap { position: relative; }
      .nav-wrap::after {
        content: '';
        position: absolute;
        top: 0; right: 0;
        width: 48px; height: 100%;
        background: linear-gradient(to right, transparent, var(--surface));
        pointer-events: none;
      }
      nav { padding: 10px 12px; justify-content: flex-start; -webkit-overflow-scrolling: touch; }
      .tab { font-size: 13px; padding: 11px 8px 11px 4px; }
      .date-strip { padding: 8px 12px; }
      main { padding: 14px 12px; }
      .grid { grid-template-columns: 1fr; }
      .card-body { padding: 14px 12px 32px; gap: 6px; }
      .team-logo, .team-logo-ph, .team-logo-wrap { width: 36px; }
      .team-logo, .team-logo-ph { height: 36px; }
      .team-score { font-size: 24px; }
      .stats-inner { padding: 12px; }
      .modal-overlay.open { align-items: flex-end; }
      .modal { max-width: 100%; border-radius: 16px 16px 0 0; max-height: 85vh; }
    }
  </style>
</head>
<body>

<header>
  <div class="theme-toggle" onclick="toggleTheme()" title="Toggle day/night mode">
    <span class="theme-toggle-icon">&#9790;</span>
    <div class="theme-track"><div class="theme-thumb"></div></div>
    <span class="theme-toggle-icon">&#9728;</span>
  </div>
  <h1>Maddy's Sports Hub</h1>
  <div class="header-right">
    <span id="last-updated"></span>
    <button class="btn" id="refresh-btn" onclick="manualRefresh()">Refresh</button>
  </div>
</header>

<div class="nav-wrap"><nav id="tabs"></nav></div>
<div class="date-strip" id="date-strip"></div>


<main>
  <div id="content"></div>
  <div class="countdown" id="countdown-wrap">
    <div class="countdown-ring">
      <svg width="18" height="18" viewBox="0 0 18 18">
        <circle class="ring-bg" cx="9" cy="9" r="7"/>
        <circle class="ring-fill" id="ring" cx="9" cy="9" r="7"
          stroke-dasharray="43.98" stroke-dashoffset="0"/>
      </svg>
    </div>
    <span id="countdown-text">Refreshing in 30s</span>
  </div>
</main>

<script>
const PRESET_SPORTS = {
  nba:        { label: 'NBA',                      category: 'Basketball',        path: 'basketball/nba',                       type: 'basketball' },
  wnba:       { label: 'WNBA',                     category: 'Basketball',        path: 'basketball/wnba',                      type: 'basketball' },
  ncaab:      { label: 'NCAA Basketball (Men)',    category: 'Basketball',        path: 'basketball/mens-college-basketball',   type: 'basketball' },
  ncaaw:      { label: 'NCAA Basketball (Women)',  category: 'Basketball',        path: 'basketball/womens-college-basketball', type: 'basketball' },
  nfl:        { label: 'NFL',                      category: 'American Football', path: 'football/nfl',                         type: 'football'   },
  ncaaf:      { label: 'NCAA Football',            category: 'American Football', path: 'football/college-football',            type: 'football'   },
  mlb:        { label: 'MLB',                      category: 'Baseball',          path: 'baseball/mlb',                         type: 'baseball'   },
  nhl:        { label: 'NHL',                      category: 'Ice Hockey',        path: 'hockey/nhl',                           type: 'hockey'     },
  fifa:       { label: 'FIFA World Cup',           category: 'Soccer',            path: 'soccer/fifa.world',                    type: 'soccer'     },
  epl:        { label: 'Premier League',           category: 'Soccer',            path: 'soccer/eng.1',                         type: 'soccer'     },
  laliga:     { label: 'La Liga',                  category: 'Soccer',            path: 'soccer/esp.1',                         type: 'soccer'     },
  bundesliga: { label: 'Bundesliga',               category: 'Soccer',            path: 'soccer/ger.1',                         type: 'soccer'     },
  seriea:     { label: 'Serie A',                  category: 'Soccer',            path: 'soccer/ita.1',                         type: 'soccer'     },
  ligue1:     { label: 'Ligue 1',                  category: 'Soccer',            path: 'soccer/fra.1',                         type: 'soccer'     },
  mls:        { label: 'MLS',                      category: 'Soccer',            path: 'soccer/usa.1',                         type: 'soccer'     },
  ucl:        { label: 'UEFA Champions League',    category: 'Soccer',            path: 'soccer/uefa.champions',                type: 'soccer'     },
  atp:        { label: 'ATP Tour',                 category: 'Tennis',            path: 'tennis/atp',                           type: 'tennis'     },
  wta:        { label: 'WTA Tour',                 category: 'Tennis',            path: 'tennis/wta',                           type: 'tennis'     },
};

function buildSportsMap(keys) {
  const map = {};
  keys.forEach(key => {
    const p = PRESET_SPORTS[key];
    if (!p) return;
    const base = `https://site.api.espn.com/apis/site/v2/sports/${p.path}`;
    map[key] = { label: p.label, url: `${base}/scoreboard`, summaryBase: `${base}/summary?event=`, type: p.type };
  });
  return map;
}

const DEFAULT_SPORT_KEYS = ['fifa', 'nba', 'wnba'];
let activeSportKeys = JSON.parse(localStorage.getItem('active-sports') || 'null') || [...DEFAULT_SPORT_KEYS];
let SPORTS_MAP = buildSportsMap(activeSportKeys);

const REFRESH_INTERVAL = 30;

// Return YYYYMMDD for a Date in Sydney timezone
function getSydneyDateStr(d) {
  return new Intl.DateTimeFormat('en-CA', {
    timeZone: 'Australia/Sydney',
    year: 'numeric', month: '2-digit', day: '2-digit',
  }).format(d).replace(/-/g, '');
}

// Calendar arithmetic on a YYYYMMDD string (no timezone involved)
function addDays(dateStr, n) {
  const y = +dateStr.slice(0,4), m = +dateStr.slice(4,6)-1, d = +dateStr.slice(6,8);
  const r = new Date(y, m, d + n);
  return `${r.getFullYear()}${String(r.getMonth()+1).padStart(2,'0')}${String(r.getDate()).padStart(2,'0')}`;
}

const TODAY = getSydneyDateStr(new Date());
let selectedDate = TODAY;

let sportOrder = (() => {
  const saved = JSON.parse(localStorage.getItem('sport-order') || 'null');
  if (saved) {
    const filtered = saved.filter(k => activeSportKeys.includes(k));
    const missing = activeSportKeys.filter(k => !filtered.includes(k));
    return [...filtered, ...missing];
  }
  return [...activeSportKeys];
})();
const savedActive = localStorage.getItem('active-tab');
let active = (savedActive && sportOrder.includes(savedActive)) ? savedActive : sportOrder[0];
let scoreCache = {};
let statsCache = {};
let liveCount = {};
let expandedIds = new Set();
let loadingStats = new Set();
let dragSrc = null;
let secondsLeft = REFRESH_INTERVAL;
let timer;

// ── Logo error handler ─────────────────────────────────────────────────────

function imgErr(el, abbr) {
  el.outerHTML = `<div class="team-logo-ph">${abbr}</div>`;
}

// ── Sydney time formatter ──────────────────────────────────────────────────

function fmtSydney(isoString) {
  if (!isoString) return '';
  return new Date(isoString).toLocaleString('en-AU', {
    timeZone: 'Australia/Sydney',
    hour: 'numeric',
    minute: '2-digit',
    hour12: true,
    timeZoneName: 'short',
  });
}

// ── Drag & Drop tabs ───────────────────────────────────────────────────────

function tabDragStart(e, key) {
  dragSrc = key;
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', key);
  setTimeout(() => {
    const t = document.querySelector(`.tab[data-key="${key}"]`);
    if (t) t.classList.add('dragging');
  }, 0);
}

function tabDragOver(e, key) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('drag-over'));
  if (key !== dragSrc) {
    const t = document.querySelector(`.tab[data-key="${key}"]`);
    if (t) t.classList.add('drag-over');
  }
}

function tabDragLeave(e) {
  e.currentTarget.classList.remove('drag-over');
}

function tabDrop(e, key) {
  e.preventDefault();
  document.querySelectorAll('.tab').forEach(t => {
    t.classList.remove('drag-over', 'dragging');
  });
  if (!dragSrc || dragSrc === key) { dragSrc = null; return; }
  const from = sportOrder.indexOf(dragSrc);
  const to   = sportOrder.indexOf(key);
  sportOrder.splice(from, 1);
  sportOrder.splice(to, 0, dragSrc);
  localStorage.setItem('sport-order', JSON.stringify(sportOrder));
  dragSrc = null;
  renderTabs();
}

function tabDragEnd() {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('drag-over', 'dragging'));
  dragSrc = null;
}

// ── Tabs ───────────────────────────────────────────────────────────────────

function renderTabs() {
  document.getElementById('tabs').innerHTML = sportOrder.map(key => {
    const s = SPORTS_MAP[key];
    if (!s) return '';
    const count = liveCount[key] || 0;
    const badge = count > 0 ? `<span class="live-count">${count}</span>` : '';
    return `
      <button class="tab ${key === active ? 'active' : ''}" data-key="${key}"
        onclick="switchTab('${key}')"
        draggable="true"
        ondragstart="tabDragStart(event,'${key}')"
        ondragover="tabDragOver(event,'${key}')"
        ondragleave="tabDragLeave(event)"
        ondrop="tabDrop(event,'${key}')"
        ondragend="tabDragEnd()">
        <span class="drag-handle" title="Drag to reorder">&#8801;</span>
        ${s.label}${badge}
      </button>`;
  }).join('') + `<button class="tab-add" onclick="openSportsModal()" title="Add or remove sports">+</button>`;
}

// ── Content ────────────────────────────────────────────────────────────────

function renderContent() {
  const el = document.getElementById('content');

  const cached = scoreCache[`${active}-${selectedDate}`];

  if (!cached) {
    el.innerHTML = `<div class="loading-state"><div class="spinner"></div>Loading scores...</div>`;
    return;
  }
  if (cached.error) {
    el.innerHTML = `<div class="error-state">Could not load scores: ${cached.error}. Check your internet connection.</div>`;
    return;
  }
  if (cached.events.length === 0) {
    const d = new Date(+selectedDate.slice(0,4), +selectedDate.slice(4,6)-1, +selectedDate.slice(6,8));
    const label = d.toLocaleDateString('en-AU', { weekday: 'long', day: 'numeric', month: 'long' });
    el.innerHTML = `<div class="empty-state"><h2>No games</h2><p>No ${SPORTS_MAP[active].label} games ${selectedDate === TODAY ? 'today' : 'on ' + label}.</p></div>`;
    return;
  }

  const sorted = [...cached.events].sort((a, b) => {
    const o = { in: 0, pre: 1, post: 2 };
    return (o[a.status.type.state] ?? 3) - (o[b.status.type.state] ?? 3);
  });

  el.innerHTML = `<div class="grid">${sorted.map(e => renderCard(e, active)).join('')}</div>`;

  // Restore any previously expanded cards
  for (const id of expandedIds) {
    const panel = document.getElementById(`stats-${id}`);
    if (panel) {
      const card = panel.closest('.card');
      panel.classList.add('open');
      if (card) card.classList.add('expanded');
      if (statsCache[id]) injectStats(id, active, statsCache[id]);
    } else {
      expandedIds.delete(id);
    }
  }
}

function renderTennisCard(event) {
  const t = event._tennis;
  const state = event.status.type.state;
  const isLive = state === 'in';
  const isPre  = state === 'pre';
  const fullDetail  = event.status.type.detail || '';
  const shortDetail = event.status.type.shortDetail || fullDetail;

  // Build score data — prefer Sofascore for live matches
  const sofa = t.sofa;
  let p1Pts = '';  // individual game points per player
  let p2Pts = '';
  let sofaSets = null;

  if (isLive && sofa) {
    const hs = sofa.homeScore;
    const as = sofa.awayScore;
    // Individual game points (Sofascore: 0=0, 1=15, 2=30, 3=40, 50=Ad)
    p1Pts = sofaPts(hs?.point);
    p2Pts = sofaPts(as?.point);
    // Build set array from period fields
    const periods = Object.keys(hs || {})
      .filter(k => /^period\d+$/.test(k))
      .sort((a, b) => parseInt(a.slice(6)) - parseInt(b.slice(6)));
    if (periods.length) {
      sofaSets = periods.map(p => ({
        h: hs[p], a: as?.[p],
        tb_h: hs[`${p}TieBreak`] ?? null,
        tb_a: as?.[`${p}TieBreak`] ?? null,
      }));
      if (hs?.current != null) {
        sofaSets.push({ h: hs.current, a: as?.current, current: true });
      }
    }
  }

  const statusLabel = isPre ? fmtSydney(event.date) : shortDetail;

  const flagEl = (athlete) => {
    const href = athlete?.flag?.href;
    const alt  = athlete?.flag?.alt || '';
    return href
      ? `<img class="ts-flag" src="${href}" alt="${alt}" onerror="this.style.display='none'">`
      : `<div class="ts-flag-ph"></div>`;
  };

  const playerName = (comp) => {
    const a = comp.athlete;
    if (a?.shortName) return a.shortName;
    if (a?.displayName) return a.displayName;
    if (comp.athletes?.length) return comp.athletes.map(x => x.shortName || x.displayName).join(' / ');
    return '?';
  };

  const p1 = t.competitors[0];
  const p2 = t.competitors[1];
  if (!p1 || !p2) return '';

  // Build set display — prefer Sofascore periods, fall back to ESPN linescores
  const sets = sofaSets || (() => {
    const max = Math.max((p1.linescores||[]).length, (p2.linescores||[]).length);
    return Array.from({ length: max }, (_, i) => ({
      h: parseInt((p1.linescores||[])[i]?.value ?? ''),
      a: parseInt((p2.linescores||[])[i]?.value ?? ''),
      tb_h: (p1.linescores||[])[i]?.tiebreakScore ?? null,
      tb_a: (p2.linescores||[])[i]?.tiebreakScore ?? null,
      current: isLive && i === max - 1,
    }));
  })();
  const maxSets = sets.length;

  const setSpans = (isP1) =>
    sets.map((s, i) => {
      const mine = isP1 ? s.h : s.a;
      const opp  = isP1 ? s.a : s.h;
      const tb   = isP1 ? s.tb_h : s.tb_a;
      if (mine == null || isNaN(mine)) return `<span class="ts-set" style="opacity:0">0</span>`;
      const tbEl = tb != null ? `<sup>${tb}</sup>` : '';
      const cls  = s.current ? 'ts-set' : (mine > opp ? 'ts-set won' : 'ts-set');
      return `<span class="${cls}">${mine}${tbEl}</span>`;
    }).join('');

  const isP1Serving = sofa
    ? sofa.serving === 1
    : p1.serving;

  const showPts = isLive && (p1Pts || p2Pts);

  const playerRow = (comp, isP1) => {
    const seed = comp.athlete?.rank || comp.seed || '';
    const isServing = isLive && (isP1 ? isP1Serving : !isP1Serving);
    const myPts = isP1 ? p1Pts : p2Pts;
    const ptsEl = showPts ? `<span class="ts-pts">${myPts || ''}</span>` : '';
    const ball  = isServing ? `<span class="ts-ball">🎾</span>` : `<span class="ts-ball"></span>`;
    return `
      <div class="tennis-row">
        ${flagEl(comp.athlete)}
        ${seed ? `<span class="ts-seed">${seed}</span>` : '<span class="ts-seed"></span>'}
        <span class="ts-name${comp.winner ? ' winner' : ''}">${playerName(comp)}</span>
        ${ball}
        <div class="ts-scores">
          ${maxSets > 0 ? setSpans(isP1) : ''}
          ${ptsEl}
        </div>
      </div>`;
  };

  const metaLeft = [t.grouping, t.court].filter(Boolean).join(' · ');
  const statusRight = isLive
    ? '<div class="live-badge"><div class="live-dot"></div>LIVE</div>'
    : `<span style="font-size:11px;color:var(--muted)">${statusLabel}</span>`;

  return `
    <div class="card ${isLive ? 'is-live' : ''}">
      <div class="card-top">
        <span class="tennis-meta-inline">${metaLeft}</span>
        ${statusRight}
      </div>
      ${playerRow(p1, true)}
      ${playerRow(p2, false)}
    </div>`;
}

function renderCard(event, sportKey) {
  if (SPORTS_MAP[sportKey]?.type === 'tennis') return renderTennisCard(event);
  const comp  = event.competitions[0];
  const away  = comp.competitors.find(c => c.homeAway === 'away') || comp.competitors[0];
  const home  = comp.competitors.find(c => c.homeAway === 'home') || comp.competitors[1];
  const state = event.status.type.state;
  const isLive = state === 'in';
  const isFinal = state === 'post';
  const isPre  = state === 'pre';
  const detail = isPre
    ? fmtSydney(event.date)
    : (event.status.type.shortDetail || event.status.type.detail || '');

  const awayScore = (away.score !== undefined && away.score !== '') ? parseInt(away.score) : null;
  const homeScore = (home.score !== undefined && home.score !== '') ? parseInt(home.score) : null;
  // Use winner field directly — handles penalty shootouts where scores are equal
  const awayWins  = isFinal && (away.winner === true || (!away.winner && !home.winner && awayScore !== null && homeScore !== null && awayScore > homeScore));
  const homeWins  = isFinal && (home.winner === true || (!away.winner && !home.winner && homeScore !== null && awayScore !== null && homeScore > awayScore));

  // Penalty shootout: detect from status detail and extract per-team pen scores from notes
  const statusDetail = event.status.type.detail || event.status.type.shortDetail || '';
  const isPens = isFinal && /pen/i.test(statusDetail);
  let awayPen = null, homePen = null;
  if (isPens) {
    const penNote = (comp.notes || []).find(n => /penalt/i.test(n.text || ''))?.text || '';
    const penMatch = penNote.match(/(\d+)[–\-](\d+)\s+on\s+penalt/i);
    if (penMatch) {
      // First number belongs to the winner, second to the loser
      const winPen = parseInt(penMatch[1]);
      const losePen = parseInt(penMatch[2]);
      awayPen = awayWins ? winPen : losePen;
      homePen = homeWins ? winPen : losePen;
    }
  }

  const scoreEl = (score, pen, wins, isHome = false) => {
    const cls = isFinal && !wins ? 'dim' : '';
    const penEl = pen !== null ? `<span class="pen-bracket">(${pen})</span>` : '';
    const main = isPre ? '–' : `${score !== null ? score : '--'}`;
    return isHome
      ? `<div class="team-score ${cls}">${penEl}${main}</div>`
      : `<div class="team-score ${cls}">${main}${penEl}</div>`;
  };

  const logoEl = (team) => team.logo
    ? `<img class="team-logo" src="${team.logo}" alt="${team.abbreviation}" onerror="imgErr(this,'${team.abbreviation}')">`
    : `<div class="team-logo-ph">${team.abbreviation}</div>`;

  const topLeft = isLive
    ? `<div class="live-badge"><div class="live-dot"></div>LIVE</div>`
    : `<div></div>`;

  const hint = !isPre
    ? `<div class="stats-hint" id="hint-${event.id}">&#9660; Player Stats</div>`
    : '';

  const clickAttr = !isPre
    ? `onclick="toggleStats('${event.id}','${sportKey}')"`
    : '';

  return `
    <div class="card ${isLive ? 'is-live' : ''} ${!isPre ? 'clickable' : ''}" ${clickAttr}>
      <div class="card-top">
        ${topLeft}
        <div class="game-status">${detail}</div>
      </div>
      <div class="card-body">
        <div class="team-side away">
          <div class="team-logo-wrap">
            ${logoEl(away.team)}
            <span class="team-ha">Away</span>
          </div>
          <div class="team-name-wrap">
            <div class="team-abbr">${away.team.abbreviation}</div>
          </div>
        </div>
        <div class="score-center">
          ${scoreEl(awayScore, awayPen, awayWins, false)}
          <span class="score-sep">:</span>
          ${scoreEl(homeScore, homePen, homeWins, true)}
        </div>
        <div class="team-side home">
          <div class="team-logo-wrap">
            ${logoEl(home.team)}
            <span class="team-ha">Home</span>
          </div>
          <div class="team-name-wrap">
            <div class="team-abbr">${home.team.abbreviation}</div>
          </div>
        </div>
      </div>
      ${hint}
      <div class="stats-panel" id="stats-${event.id}">
        <div class="stats-inner" id="stats-inner-${event.id}"></div>
      </div>
    </div>`;
}

// ── Stats toggle ───────────────────────────────────────────────────────────

async function toggleStats(gameId, sportKey) {
  const panel = document.getElementById(`stats-${gameId}`);
  const hint  = document.getElementById(`hint-${gameId}`);
  if (!panel) return;

  const card = panel.closest('.card');

  if (expandedIds.has(gameId)) {
    expandedIds.delete(gameId);
    panel.classList.remove('open');
    if (card) card.classList.remove('expanded');
    if (hint) hint.innerHTML = '&#9660; Player Stats';
    return;
  }

  expandedIds.add(gameId);
  panel.classList.add('open');
  if (card) card.classList.add('expanded');
  if (hint) hint.innerHTML = '&#9650; Player Stats';

  if (statsCache[gameId]) {
    injectStats(gameId, sportKey, statsCache[gameId]);
    return;
  }

  if (loadingStats.has(gameId)) return;

  const inner = document.getElementById(`stats-inner-${gameId}`);
  if (inner) inner.innerHTML = `<div class="stats-loading"><div class="spinner"></div>Loading stats...</div>`;

  loadingStats.add(gameId);
  try {
    const res = await fetch(SPORTS_MAP[sportKey].summaryBase + gameId);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    statsCache[gameId] = data;
    if (expandedIds.has(gameId)) injectStats(gameId, sportKey, data);
  } catch (err) {
    if (expandedIds.has(gameId)) {
      const inner = document.getElementById(`stats-inner-${gameId}`);
      if (inner) inner.innerHTML = `<div class="stats-empty">Could not load stats: ${err.message}</div>`;
    }
  } finally {
    loadingStats.delete(gameId);
  }
}

function injectStats(gameId, sportKey, data) {
  const inner = document.getElementById(`stats-inner-${gameId}`);
  if (!inner) return;
  inner.innerHTML = SPORTS_MAP[sportKey].type === 'basketball'
    ? renderBasketballStats(data, gameId)
    : renderSoccerStats(data);
}

// ── Basketball stats ───────────────────────────────────────────────────────

function renderBasketballStats(data, gameId) {
  const players = data.boxscore?.players;
  if (!players || players.length === 0) return `<div class="stats-empty">No stats available yet</div>`;

  const blocks = players.map(teamData => {
    const stats = teamData.statistics?.[0];
    if (!stats) return '';

    const names = stats.names || [];
    const idx   = n => names.indexOf(n);
    const ptsI  = idx('PTS');
    const rebI  = idx('REB');
    const astI  = idx('AST');
    const fgI   = idx('FG');
    const tpI   = idx('3PT');
    const minI  = idx('MIN');

    const athletes = (stats.athletes || [])
      .filter(a => !a.didNotPlay && a.stats && a.stats.length > 0)
      .sort((a, b) => (parseFloat(b.stats[ptsI]) || 0) - (parseFloat(a.stats[ptsI]) || 0));

    if (!athletes.length) return '';

    const showMin = minI >= 0;
    const showFg  = fgI >= 0;
    const showTp  = tpI >= 0;
    const blockId = `ts-${gameId}-${teamData.team.abbreviation}`;
    const extra   = athletes.length > 5;

    const rows = athletes.map((a, i) => {
      const s    = a.stats;
      const name = a.athlete.shortName || a.athlete.displayName || '';
      const cls  = i >= 5 ? ' class="extra-player"' : '';
      return `<tr${cls}>
        <td class="col-name">${name}</td>
        ${showMin ? `<td>${s[minI] ?? '--'}</td>` : ''}
        <td class="pts">${s[ptsI] ?? '--'}</td>
        <td>${rebI >= 0 ? (s[rebI] ?? '--') : '--'}</td>
        <td>${astI >= 0 ? (s[astI] ?? '--') : '--'}</td>
        ${showFg  ? `<td>${s[fgI]  ?? '--'}</td>` : ''}
        ${showTp  ? `<td>${s[tpI]  ?? '--'}</td>` : ''}
      </tr>`;
    }).join('');

    return `
      <div class="team-stats-block" id="${blockId}">
        <div class="team-stats-label">${teamData.team.abbreviation}</div>
        <table class="stats-table">
          <thead><tr>
            <th class="col-name">Player</th>
            ${showMin ? '<th>MIN</th>' : ''}
            <th>PTS</th><th>REB</th><th>AST</th>
            ${showFg ? '<th>FG</th>' : ''}
            ${showTp ? '<th>3PT</th>' : ''}
          </tr></thead>
          <tbody>${rows}</tbody>
        </table>
        ${extra ? `<button class="show-more-btn" onclick="event.stopPropagation();toggleTeamStats('${blockId}',${athletes.length})">Show all ${athletes.length} players</button>` : ''}
      </div>`;
  }).filter(Boolean).join('');

  return blocks ? `<div class="bball-stats">${blocks}</div>` : `<div class="stats-empty">No stats available yet</div>`;
}

function toggleTeamStats(id, total) {
  const block = document.getElementById(id);
  if (!block) return;
  const expanded = block.classList.toggle('expanded');
  const btn = block.querySelector('.show-more-btn');
  if (btn) btn.textContent = expanded ? 'Show less' : `Show all ${total} players`;
}

// ── Soccer stats ───────────────────────────────────────────────────────────

function renderSoccerStats(data) {
  // ESPN soccer uses keyEvents with scoringPlay:true — not scoringPlays
  const goals = (data.keyEvents || []).filter(e => e.scoringPlay === true);
  if (!goals.length) return `<div class="stats-empty">No goals scored yet</div>`;

  const rows = goals.map(play => {
    const clock    = play.clock?.displayValue || '';
    const teamName = play.team?.displayName || '';
    const typeSlug = play.type?.type || '';
    const isOG     = typeSlug === 'own-goal'  || (play.type?.text || '').toLowerCase().includes('own');
    const isPen    = typeSlug === 'penalty'   || (play.type?.text || '').toLowerCase().includes('pen');

    // participants[0] = scorer, participants[1] = assister (when present)
    const scorer  = play.participants?.[0]?.athlete?.displayName || '';
    const assister = play.participants?.[1]?.athlete?.displayName || '';

    const badge = isOG ? 'OG' : isPen ? 'Pen' : '';

    return `
      <div class="goal-event">
        <span class="goal-clock">${clock}</span>
        <span>&#9917;</span>
        <div class="goal-detail">
          <span class="goal-name">${scorer || teamName}</span>
          ${assister ? `<span class="goal-assist">Assist: ${assister}</span>` : ''}
        </div>
        ${teamName ? `<span class="goal-team">${teamName.split(' ').pop()}</span>` : ''}
        ${badge ? `<span class="goal-badge">${badge}</span>` : ''}
      </div>`;
  }).join('');

  return `<div><div class="goals-title">Goals</div>${rows}</div>`;
}

// ── Sofascore tennis live data ─────────────────────────────────────────────

function sofaLastName(name) {
  if (!name) return '';
  // Handles "Djokovic N.", "N. Djokovic", "Novak Djokovic"
  const parts = name.trim().split(/\s+/);
  const long = parts.filter(p => p.length > 2 && !p.includes('.'));
  const base = long.length ? long[long.length - 1] : parts[parts.length - 1];
  return base.toLowerCase().replace(/[^a-z]/g, '');
}

const SOFA_PTS = ['0', '15', '30', '40']; // Sofascore uses 0-3 index

function sofaPts(val) {
  if (val == null) return '';
  if (val === 50) return 'Ad';
  return SOFA_PTS[val] ?? String(val);
}

async function fetchSofascoreLive() {
  try {
    const r = await fetch('https://api.sofascore.com/api/v1/sport/tennis/events/live');
    if (!r.ok) return null;
    const d = await r.json();
    const map = {};
    for (const ev of (d.events || [])) {
      const hKey = sofaLastName(ev.homeTeam?.name);
      const aKey = sofaLastName(ev.awayTeam?.name);
      if (!hKey || !aKey) continue;
      const payload = {
        homeScore: ev.homeScore,
        awayScore: ev.awayScore,
        serving: ev.firstToServe,  // 1=home, 2=away
      };
      map[`${hKey}|${aKey}`] = payload;
      // Reverse mapping (swap home/away)
      map[`${aKey}|${hKey}`] = {
        homeScore: ev.awayScore,
        awayScore: ev.homeScore,
        serving: ev.firstToServe === 1 ? 2 : 1,
      };
    }
    return map;
  } catch (_) { return null; }
}

// ── Data fetching ──────────────────────────────────────────────────────────

async function fetchTennis(key) {
  const cacheKey = `${key}-${selectedDate}`;
  try {
    const { url } = SPORTS_MAP[key];
    const [r1, r2] = await Promise.all([
      fetch(`${url}?dates=${addDays(selectedDate, -1)}`),
      fetch(`${url}?dates=${selectedDate}`),
    ]);
    const [d1, d2] = await Promise.all([
      r1.ok ? r1.json() : Promise.resolve({ events: [] }),
      r2.ok ? r2.json() : Promise.resolve({ events: [] }),
    ]);
    const seen = new Set();
    const matches = [];
    for (const data of [d1, d2]) {
      for (const tournament of (data.events || [])) {
        for (const groupingObj of (tournament.groupings || [])) {
          const groupingName = groupingObj.grouping?.displayName || '';
          for (const comp of (groupingObj.competitions || [])) {
            if (seen.has(comp.id)) continue;
            const dateStr = comp.startDate || comp.date;
            if (dateStr && getSydneyDateStr(new Date(dateStr)) !== selectedDate) continue;
            seen.add(comp.id);
            matches.push({
              id: comp.id,
              date: dateStr,
              status: comp.status,
              _tennis: {
                tournament: tournament.shortName || tournament.name,
                grouping: groupingName,
                court: comp.venue?.court || '',
                competitors: comp.competitors || [],
              },
            });
          }
        }
      }
    }
    // Enrich live matches with ESPN detail + Sofascore point scores
    const liveMatches = matches.filter(m => m.status?.type?.state === 'in');
    if (liveMatches.length > 0) {
      const summaryBase = SPORTS_MAP[key].summaryBase;
      const [sofaMap] = await Promise.all([
        fetchSofascoreLive(),
        Promise.all(liveMatches.map(async match => {
          try {
            const r = await fetch(summaryBase + match.id);
            if (!r.ok) return;
            const d = await r.json();
            const comp = d.competition || d.gamePackage?.competition;
            const sit  = d.situation || d.gamePackage?.situation || comp?.situation;
            const richDetail = comp?.status?.type?.detail || d.header?.competitions?.[0]?.status?.type?.detail || '';
            if (richDetail) match.status = { ...match.status, type: { ...match.status.type, detail: richDetail } };
            const detailComps = comp?.competitors || d.header?.competitions?.[0]?.competitors;
            if (detailComps?.length) match._tennis.competitors = detailComps;
            if (sit) match._tennis.situation = sit;
          } catch (_) {}
        })),
      ]);

      // Match ESPN live events to Sofascore by player last name
      if (sofaMap) {
        for (const match of liveMatches) {
          const comps = match._tennis.competitors;
          const p1 = comps[0];
          const p2 = comps[1];
          const getName = c => c?.athlete?.shortName || c?.athlete?.displayName || '';
          const k1 = sofaLastName(getName(p1));
          const k2 = sofaLastName(getName(p2));
          const sofa = sofaMap[`${k1}|${k2}`];
          if (sofa) match._tennis.sofa = sofa;
        }
      }
    }

    scoreCache[cacheKey] = { events: matches, error: null };
    liveCount[key] = selectedDate === TODAY
      ? matches.filter(m => m.status?.type?.state === 'in').length : 0;
  } catch (err) {
    scoreCache[cacheKey] = { events: [], error: err.message };
    liveCount[key] = 0;
  }
}

async function fetchSport(key) {
  if (SPORTS_MAP[key]?.type === 'tennis') return fetchTennis(key);
  const cacheKey = `${key}-${selectedDate}`;
  try {
    const { url } = SPORTS_MAP[key];
    // A Sydney date spans two consecutive UTC days, so fetch both adjacent
    // ESPN dates then filter to only events whose Sydney date matches.
    const [r1, r2] = await Promise.all([
      fetch(`${url}?dates=${addDays(selectedDate, -1)}`),
      fetch(`${url}?dates=${selectedDate}`),
    ]);
    const [d1, d2] = await Promise.all([
      r1.ok ? r1.json() : Promise.resolve({ events: [] }),
      r2.ok ? r2.json() : Promise.resolve({ events: [] }),
    ]);
    const seen = new Set();
    const events = [...(d1.events || []), ...(d2.events || [])].filter(e => {
      if (seen.has(e.id)) return false;
      seen.add(e.id);
      return !e.date || getSydneyDateStr(new Date(e.date)) === selectedDate;
    });
    scoreCache[cacheKey] = { events, error: null };
    liveCount[key] = selectedDate === TODAY
      ? events.filter(e => e.status.type.state === 'in').length
      : 0;
  } catch (err) {
    scoreCache[cacheKey] = { events: [], error: err.message };
    liveCount[key] = 0;
  }
}

async function fetchAll() {
  await Promise.all(Object.keys(SPORTS_MAP).map(fetchSport));
  renderTabs();
  renderDateStrip();
  renderContent();
  updateTimestamp();
}

async function fetchActive() {
  if (selectedDate !== TODAY) return;
  await fetchSport(active);
  renderTabs();
  renderContent();
  updateTimestamp();
}

function updateTimestamp() {
  const t = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  document.getElementById('last-updated').textContent = `⏱ ${t}`;
}

// ── Countdown ──────────────────────────────────────────────────────────────

function startCountdown() {
  clearInterval(timer);
  if (selectedDate !== TODAY) return;
  secondsLeft = REFRESH_INTERVAL;
  updateCountdownUI();
  timer = setInterval(async () => {
    secondsLeft--;
    updateCountdownUI();
    if (secondsLeft <= 0) {
      secondsLeft = REFRESH_INTERVAL;
      await fetchActive();
    }
  }, 1000);
}

function updateCountdownUI() {
  document.getElementById('ring').style.strokeDashoffset = 43.98 * (1 - secondsLeft / REFRESH_INTERVAL);
  document.getElementById('countdown-text').textContent = `Refreshing in ${secondsLeft}s`;
}

// ── Date strip ─────────────────────────────────────────────────────────────

function renderDateStrip() {
  const pills = [];
  for (let i = -3; i <= 3; i++) {
    const ds = addDays(TODAY, i);
    // Build a local Date just for weekday/day labels (calendar values, no tz needed)
    const d   = new Date(+ds.slice(0,4), +ds.slice(4,6)-1, +ds.slice(6,8));
    const dow = d.toLocaleDateString('en-AU', { weekday: 'short' });
    const day = d.getDate();
    const isToday  = ds === TODAY;
    const isActive = ds === selectedDate;
    pills.push(`
      <button class="date-pill ${isToday ? 'today' : ''} ${isActive ? 'active' : ''}" onclick="selectDate('${ds}')">
        <span class="pill-dow">${dow}</span>
        <span class="pill-num">${day}</span>
        ${isToday ? '<span class="pill-today">Today</span>' : ''}
      </button>`);
  }
  document.getElementById('date-strip').innerHTML = pills.join('');
}

function selectDate(ds) {
  selectedDate = ds;
  expandedIds.clear();
  renderDateStrip();

  const wrap = document.getElementById('countdown-wrap');
  if (ds === TODAY) {
    wrap.style.display = '';
    startCountdown();
  } else {
    clearInterval(timer);
    wrap.style.display = 'none';
  }

  const cacheKey = `${active}-${ds}`;
  if (!scoreCache[cacheKey]) {
    document.getElementById('content').innerHTML =
      `<div class="loading-state"><div class="spinner"></div>Loading scores...</div>`;
    fetchSport(active).then(() => { renderTabs(); renderContent(); });
  } else {
    renderContent();
  }
}

// ── Controls ───────────────────────────────────────────────────────────────

function switchTab(key) {
  active = key;
  localStorage.setItem('active-tab', key);
  expandedIds.clear();
  renderTabs();
  renderContent();
  const cacheKey = `${key}-${selectedDate}`;
  if (!scoreCache[cacheKey]) fetchSport(key).then(() => { renderTabs(); renderContent(); });
}

async function manualRefresh() {
  const btn = document.getElementById('refresh-btn');
  btn.disabled = true;
  btn.textContent = 'Refreshing...';
  Object.keys(SPORTS_MAP).forEach(k => delete scoreCache[`${k}-${selectedDate}`]);
  await fetchAll();
  if (selectedDate === TODAY) startCountdown();
  btn.disabled = false;
  btn.textContent = 'Refresh';
}

// ── Sports modal ───────────────────────────────────────────────────────────

function openSportsModal() {
  renderSportsModal();
  document.getElementById('sports-modal-overlay').classList.add('open');
}

function closeSportsModal(e) {
  if (e && e.target !== document.getElementById('sports-modal-overlay')) return;
  document.getElementById('sports-modal-overlay').classList.remove('open');
}

function renderSportsModal() {
  const activeSet = new Set(activeSportKeys);
  const categories = {};
  Object.entries(PRESET_SPORTS).forEach(([key, p]) => {
    if (!categories[p.category]) categories[p.category] = [];
    categories[p.category].push({ key, label: p.label });
  });
  document.getElementById('sports-modal-body').innerHTML = Object.entries(categories).map(([cat, list]) => `
    <div class="sport-category">
      <div class="sport-category-label">${cat}</div>
      ${list.map(s => {
        const on = activeSet.has(s.key);
        return `<div class="sport-row" onclick="toggleSport('${s.key}')">
          <span class="sport-row-name${on ? ' on' : ''}">${s.label}</span>
          <div class="sport-mini-track${on ? ' on' : ''}"><div class="sport-mini-thumb"></div></div>
        </div>`;
      }).join('')}
    </div>`).join('');
}

async function toggleSport(key) {
  const idx = activeSportKeys.indexOf(key);
  if (idx === -1) {
    activeSportKeys.push(key);
    sportOrder.push(key);
  } else {
    if (activeSportKeys.length === 1) return;
    activeSportKeys.splice(idx, 1);
    sportOrder.splice(sportOrder.indexOf(key), 1);
    Object.keys(scoreCache).filter(k => k.startsWith(key + '-')).forEach(k => delete scoreCache[k]);
    delete liveCount[key];
    if (active === key) active = sportOrder[0];
  }
  SPORTS_MAP = buildSportsMap(activeSportKeys);
  localStorage.setItem('active-sports', JSON.stringify(activeSportKeys));
  localStorage.setItem('sport-order', JSON.stringify(sportOrder));
  renderSportsModal();
  renderTabs();
  if (idx === -1) {
    await fetchSport(key);
    renderTabs();
  }
  renderContent();
}

// ── Theme ──────────────────────────────────────────────────────────────────

function toggleTheme() {
  const next = document.documentElement.dataset.theme === 'light' ? 'dark' : 'light';
  applyTheme(next);
  localStorage.setItem('theme', next);
}

function applyTheme(theme) {
  document.documentElement.dataset.theme = theme;
}

// ── Init ───────────────────────────────────────────────────────────────────

const savedTheme = localStorage.getItem('theme')
  || (window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
applyTheme(savedTheme);

renderTabs();
renderDateStrip();
document.getElementById('content').innerHTML =
  `<div class="loading-state"><div class="spinner"></div>Loading scores...</div>`;
fetchAll().then(startCountdown);
</script>

<div class="modal-overlay" id="sports-modal-overlay" onclick="closeSportsModal(event)">
  <div class="modal">
    <div class="modal-header">
      <h2>Manage Sports</h2>
      <button class="modal-close" onclick="closeSportsModal()">&times;</button>
    </div>
    <div class="modal-body" id="sports-modal-body"></div>
  </div>
</div>
